# Phase 12 S12.3 — dependency update automation.
# Dependabot runs on GitHub-hosted infra (no Actions billing for the scans).
# Grouped, low-noise PRs; majors are surfaced but reviewed per
# docs/DEPENDENCY_POLICY.md (React/Vite major-bump cadence).
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      js-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Majors for the build-critical pair are cadence-gated, not auto-bumped.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
